<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — UrbanCart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<main>
  <form id="loginForm" class="form-card">
    <h1>Welcome back</h1>
    <p class="subtitle">Login to continue shopping.</p>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />
      <p class="field-error"></p>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" />
      <p class="field-error"></p>
    </div>

    <button type="submit" class="btn btn-accent btn-block">Login</button>

    <p class="form-footer">Don't have an account? <a href="register.html">Sign up</a></p>
    <p class="form-footer" style="margin-top:6px; font-size:0.8rem;">Demo admin: admin@store.com / admin123<br/>Demo customer: customer@store.com / customer123</p>
  </form>
</main>

<footer>
  <div class="container">&copy; 2026 <span>UrbanCart</span>. Built as a Full Stack Internship Project.</div>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
