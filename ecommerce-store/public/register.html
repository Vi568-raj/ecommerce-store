<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — UrbanCart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<main>
  <form id="registerForm" class="form-card">
    <h1>Create your account</h1>
    <p class="subtitle">Join UrbanCart to start shopping.</p>

    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Vishal Raj" />
      <p class="field-error"></p>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" />
      <p class="field-error"></p>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 6 characters" />
      <p class="field-error"></p>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" />
      <p class="field-error"></p>
    </div>

    <button type="submit" class="btn btn-accent btn-block">Create Account</button>

    <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
  </form>
</main>

<footer>
  <div class="container">&copy; 2026 <span>UrbanCart</span>. Built as a Full Stack Internship Project.</div>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
