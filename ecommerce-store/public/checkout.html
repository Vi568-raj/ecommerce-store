<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — UrbanCart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="navbar"></div>

<main class="container">
  <div class="section-title"><h2>Checkout</h2></div>
  <div class="cart-wrap">
    <form id="checkoutForm" class="form-card" style="margin:0; max-width:none;">
      <h1 style="font-size:1.2rem;">Shipping Address</h1>
      <p class="subtitle">We'll deliver your order to this address.</p>

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" />
        <p class="field-error"></p>
      </div>

      <div class="form-group">
        <label for="address">Street Address</label>
        <input type="text" id="address" name="address" placeholder="House no, street, area" />
        <p class="field-error"></p>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" />
          <p class="field-error"></p>
        </div>
        <div class="form-group">
          <label for="postalCode">Postal Code</label>
          <input type="text" id="postalCode" name="postalCode" />
          <p class="field-error"></p>
        </div>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country" name="country" value="India" />
          <p class="field-error"></p>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. 9876543210" />
          <p class="field-error"></p>
        </div>
      </div>

      <div class="form-group">
        <label for="paymentMethod">Payment Method</label>
        <select id="paymentMethod" name="paymentMethod">
          <option value="COD">Cash on Delivery</option>
          <option value="Card">Credit / Debit Card</option>
          <option value="UPI">UPI</option>
        </select>
      </div>

      <button type="submit" class="btn btn-accent btn-block">Place Order</button>
    </form>

    <div id="checkoutSummary" class="summary-card"></div>
  </div>
</main>

<footer>
  <div class="container">&copy; 2026 <span>UrbanCart</span>. Built as a Full Stack Internship Project.</div>
</footer>

<script src="js/api.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
